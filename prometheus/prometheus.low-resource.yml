global:
  scrape_interval: 20s
  evaluation_interval: 20s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: kafka_exporter
    static_configs:
      - targets:
          - kafka-exporter:9308
    relabel_configs:
      - target_label: cluster
        replacement: poc-kafka-cluster
